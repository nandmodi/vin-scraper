# .github/workflows/vin_scraper.yml
#
# Triggered by Apps Script via GitHub API after every Metabase fetch.
# Runs on GitHub's free cloud servers — no laptop needed.

name: VIN Image Scraper

on:
  workflow_dispatch:        # triggered via API from Apps Script
  schedule:
    - cron: '0 * * * *'    # safety net: also runs every hour automatically

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6 hours — handles up to ~3000 rows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb -qq

      - name: Install Python dependencies
        run: |
          pip install -q --upgrade selenium webdriver-manager
          pip install -q gspread google-auth beautifulsoup4 lxml pandas tqdm

      - name: Run VIN scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
        run: python vin_scraper.py
